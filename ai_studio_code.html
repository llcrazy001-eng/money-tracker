<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyExpense - 記帳本</title>
    
    <!-- PWA Meta Tags for iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="記帳本">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .ios-blur { backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.8); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-x-hidden">

    <!-- Header -->
    <header class="fixed top-0 w-full ios-blur z-10 border-b border-gray-200 px-4 py-3 flex justify-between items-center">
        <h1 id="page-title" class="text-xl font-bold text-blue-600">儀表板</h1>
        <button onclick="showModal('transaction-modal')" class="bg-blue-600 text-white w-10 h-10 rounded-full shadow-lg flex items-center justify-center">
            <i class="fa-solid fa-plus"></i>
        </button>
    </header>

    <!-- Main Content Area -->
    <main class="pt-20 pb-24 px-4">
        
        <!-- TAB 1: Dashboard -->
        <section id="tab-dashboard" class="tab-content active space-y-6">
            <!-- Total Balance Card -->
            <div class="bg-gradient-to-br from-blue-600 to-blue-400 rounded-3xl p-6 text-white shadow-xl">
                <p class="text-sm opacity-80">總資產 (All Accounts)</p>
                <h2 id="total-balance" class="text-3xl font-bold mt-1">$ 0</h2>
                <div class="flex justify-between mt-6 text-sm">
                    <div>
                        <p class="opacity-80">本月收入</p>
                        <p id="month-income" class="text-lg font-semibold">+$0</p>
                    </div>
                    <div class="text-right">
                        <p class="opacity-80">本月支出</p>
                        <p id="month-expense" class="text-lg font-semibold">-$0</p>
                    </div>
                </div>
            </div>

            <!-- Monthly Reminders -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                <h3 class="font-bold mb-3 flex items-center text-gray-700">
                    <i class="fa-solid fa-bell text-yellow-500 mr-2"></i> 每月繳費提醒
                </h3>
                <div id="reminders-list" class="space-y-3">
                    <!-- Reminders injected here -->
                </div>
                <button onclick="showModal('reminder-modal')" class="w-full mt-3 py-2 text-sm text-blue-500 font-medium text-center">+ 新增提醒</button>
            </div>

            <!-- Quick Report Chart -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                <h3 class="font-bold mb-3 text-gray-700">收支分析</h3>
                <canvas id="expenseChart" width="400" height="400"></canvas>
            </div>
        </section>

        <!-- TAB 2: Transactions (Records) -->
        <section id="tab-records" class="tab-content space-y-4">
            <div class="flex justify-between items-center mb-2">
                <h3 class="font-bold text-lg">交易紀錄</h3>
                <button onclick="clearData()" class="text-xs text-red-400">清除所有數據</button>
            </div>
            <div id="records-list" class="space-y-3">
                <!-- Records injected here -->
            </div>
        </section>

        <!-- TAB 3: Accounts Allocation -->
        <section id="tab-accounts" class="tab-content space-y-4">
            <h3 class="font-bold text-lg mb-2">帳戶分配</h3>
            <div id="accounts-list" class="space-y-3">
                <!-- Accounts injected here -->
            </div>
            <button onclick="showModal('account-modal')" class="w-full py-3 bg-white border-2 border-dashed border-gray-300 rounded-2xl text-gray-500 font-medium">
                + 新增帳戶
            </button>
        </section>
    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="fixed bottom-0 w-full ios-blur border-t border-gray-200 flex justify-around py-3 safe-area-bottom z-10">
        <button onclick="switchTab('dashboard')" class="nav-item flex flex-col items-center text-blue-600" id="nav-dashboard">
            <i class="fa-solid fa-chart-pie text-xl"></i>
            <span class="text-[10px] mt-1">儀表板</span>
        </button>
        <button onclick="switchTab('records')" class="nav-item flex flex-col items-center text-gray-400" id="nav-records">
            <i class="fa-solid fa-list-ul text-xl"></i>
            <span class="text-[10px] mt-1">記錄</span>
        </button>
        <button onclick="switchTab('accounts')" class="nav-item flex flex-col items-center text-gray-400" id="nav-accounts">
            <i class="fa-solid fa-wallet text-xl"></i>
            <span class="text-[10px] mt-1">帳戶</span>
        </button>
    </nav>

    <!-- MODAL: Transaction -->
    <div id="transaction-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-end">
        <div class="bg-white w-full rounded-t-3xl p-6 animate-slide-up">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">新增交易</h3>
                <button onclick="closeModal('transaction-modal')" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <div class="space-y-4">
                <div class="flex gap-2">
                    <button onclick="setTxType('expense')" id="btn-exp" class="flex-1 py-2 rounded-xl bg-red-100 text-red-600 font-bold border-2 border-red-500">支出</button>
                    <button onclick="setTxType('income')" id="btn-inc" class="flex-1 py-2 rounded-xl bg-gray-100 text-gray-500 font-bold border-2 border-transparent">收入</button>
                </div>
                <input type="number" id="tx-amount" placeholder="金額" class="w-full p-4 bg-gray-100 rounded-xl text-2xl text-center font-bold">
                <input type="text" id="tx-note" placeholder="項目名稱 (例如: 午餐)" class="w-full p-4 bg-gray-100 rounded-xl">
                <select id="tx-account" class="w-full p-4 bg-gray-100 rounded-xl"></select>
                <input type="date" id="tx-date" class="w-full p-4 bg-gray-100 rounded-xl">
                <button onclick="saveTransaction()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold text-lg shadow-lg">儲存紀錄</button>
            </div>
        </div>
    </div>

    <!-- MODAL: Account -->
    <div id="account-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-end">
        <div class="bg-white w-full rounded-t-3xl p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">新增帳戶</h3>
                <button onclick="closeModal('account-modal')" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <div class="space-y-4">
                <input type="text" id="acc-name" placeholder="帳戶名稱 (例如: 國泰銀行, 現金)" class="w-full p-4 bg-gray-100 rounded-xl">
                <input type="number" id="acc-balance" placeholder="初始餘額" class="w-full p-4 bg-gray-100 rounded-xl">
                <button onclick="saveAccount()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold text-lg">建立帳戶</button>
            </div>
        </div>
    </div>

    <!-- MODAL: Reminder -->
    <div id="reminder-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-end">
        <div class="bg-white w-full rounded-t-3xl p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">新增每月提醒</h3>
                <button onclick="closeModal('reminder-modal')" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <div class="space-y-4">
                <input type="text" id="rem-name" placeholder="項目 (例如: Netflix, 水電費)" class="w-full p-4 bg-gray-100 rounded-xl">
                <input type="number" id="rem-amount" placeholder="預計金額" class="w-full p-4 bg-gray-100 rounded-xl">
                <input type="number" id="rem-day" placeholder="每月幾號提醒 (1-31)" min="1" max="31" class="w-full p-4 bg-gray-100 rounded-xl">
                <button onclick="saveReminder()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold text-lg">儲存提醒</button>
            </div>
        </div>
    </div>

    <script>
        // --- Data State ---
        let state = {
            accounts: JSON.parse(localStorage.getItem('accounts')) || [{id: 1, name: '現金', balance: 0}],
            transactions: JSON.parse(localStorage.getItem('transactions')) || [],
            reminders: JSON.parse(localStorage.getItem('reminders')) || [],
            currentTxType: 'expense'
        };

        let myChart = null;

        // --- Core Functions ---
        function saveState() {
            localStorage.setItem('accounts', JSON.stringify(state.accounts));
            localStorage.setItem('transactions', JSON.stringify(state.transactions));
            localStorage.setItem('reminders', JSON.stringify(state.reminders));
            updateUI();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.replace('text-blue-600', 'text-gray-400'));
            
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`nav-${tab}`).classList.replace('text-gray-400', 'text-blue-600');
            
            const titles = {dashboard: '儀表板', records: '交易紀錄', accounts: '帳戶分配'};
            document.getElementById('page-title').innerText = titles[tab];
            
            if(tab === 'dashboard') renderChart();
        }

        function showModal(id) { 
            document.getElementById(id).classList.remove('hidden'); 
            if(id === 'transaction-modal') {
                const accSelect = document.getElementById('tx-account');
                accSelect.innerHTML = state.accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
                document.getElementById('tx-date').valueAsDate = new Date();
            }
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function setTxType(type) {
            state.currentTxType = type;
            const isExp = type === 'expense';
            document.getElementById('btn-exp').className = isExp ? 'flex-1 py-2 rounded-xl bg-red-100 text-red-600 font-bold border-2 border-red-500' : 'flex-1 py-2 rounded-xl bg-gray-100 text-gray-500 font-bold border-2 border-transparent';
            document.getElementById('btn-inc').className = !isExp ? 'flex-1 py-2 rounded-xl bg-green-100 text-green-600 font-bold border-2 border-green-500' : 'flex-1 py-2 rounded-xl bg-gray-100 text-gray-500 font-bold border-2 border-transparent';
        }

        // --- Logic: Accounts ---
        function saveAccount() {
            const name = document.getElementById('acc-name').value;
            const balance = parseFloat(document.getElementById('acc-balance').value) || 0;
            if(!name) return alert('請輸入名稱');
            state.accounts.push({ id: Date.now(), name, balance });
            saveState();
            closeModal('account-modal');
        }

        // --- Logic: Transactions ---
        function saveTransaction() {
            const amount = parseFloat(document.getElementById('tx-amount').value);
            const note = document.getElementById('tx-note').value;
            const accId = parseInt(document.getElementById('tx-account').value);
            const date = document.getElementById('tx-date').value;

            if(!amount || !note) return alert('請填寫完整資訊');

            const tx = {
                id: Date.now(),
                type: state.currentTxType,
                amount,
                note,
                accId,
                date
            };

            state.transactions.unshift(tx);
            
            // Update Account Balance
            const acc = state.accounts.find(a => a.id === accId);
            if(tx.type === 'expense') acc.balance -= amount;
            else acc.balance += amount;

            saveState();
            closeModal('transaction-modal');
            document.getElementById('tx-amount').value = '';
            document.getElementById('tx-note').value = '';
        }

        // --- Logic: Reminders ---
        function saveReminder() {
            const name = document.getElementById('rem-name').value;
            const amount = document.getElementById('rem-amount').value;
            const day = document.getElementById('rem-day').value;
            if(!name || !day) return alert('請填寫名稱與日期');
            state.reminders.push({ id: Date.now(), name, amount, day });
            saveState();
            closeModal('reminder-modal');
        }

        function deleteReminder(id) {
            state.reminders = state.reminders.filter(r => r.id !== id);
            saveState();
        }

        function clearData() {
            if(confirm('確定要清除所有數據嗎？')) {
                localStorage.clear();
                location.reload();
            }
        }

        // --- UI Rendering ---
        function updateUI() {
            // Update Balance
            const total = state.accounts.reduce((sum, a) => sum + a.balance, 0);
            document.getElementById('total-balance').innerText = `$ ${total.toLocaleString()}`;

            // Update Monthly Stats
            const now = new Date();
            const thisMonth = now.toISOString().slice(0, 7);
            const monthlyTxs = state.transactions.filter(t => t.date.startsWith(thisMonth));
            const inc = monthlyTxs.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const exp = monthlyTxs.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            
            document.getElementById('month-income').innerText = `+$${inc.toLocaleString()}`;
            document.getElementById('month-expense').innerText = `-$${exp.toLocaleString()}`;

            // Update Accounts List
            document.getElementById('accounts-list').innerHTML = state.accounts.map(a => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                    <span class="font-medium">${a.name}</span>
                    <span class="font-bold">$ ${a.balance.toLocaleString()}</span>
                </div>
            `).join('');

            // Update Transaction List
            document.getElementById('records-list').innerHTML = state.transactions.map(t => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                    <div>
                        <p class="font-medium">${t.note}</p>
                        <p class="text-xs text-gray-400">${t.date} • ${state.accounts.find(a=>a.id===t.accId)?.name || '未知'}</p>
                    </div>
                    <span class="font-bold ${t.type === 'expense' ? 'text-red-500' : 'text-green-500'}">
                        ${t.type === 'expense' ? '-' : '+'}$ ${t.amount.toLocaleString()}
                    </span>
                </div>
            `).join('');

            // Update Reminders List
            document.getElementById('reminders-list').innerHTML = state.reminders.length ? state.reminders.map(r => `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl text-sm">
                    <div>
                        <span class="font-bold">每月 ${r.day} 號</span>
                        <span class="ml-2 text-gray-600">${r.name} ($${r.amount})</span>
                    </div>
                    <button onclick="deleteReminder(${r.id})" class="text-red-400 px-2"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('') : '<p class="text-center text-gray-400 text-sm py-2">暫無提醒</p>';
        }

        function renderChart() {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if(myChart) myChart.destroy();

            const categories = {};
            state.transactions.filter(t => t.type === 'expense').forEach(t => {
                categories[t.note] = (categories[t.note] || 0) + t.amount;
            });

            const data = {
                labels: Object.keys(categories),
                datasets: [{
                    data: Object.values(categories),
                    backgroundColor: ['#3B82F6', '#EF4444', '#10B981', '#F59E0B', '#8B5CF6', '#EC4899'],
                }]
            };

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: data,
                options: { plugins: { legend: { position: 'bottom' } }, cutout: '70%' }
            });
        }

        // Initial Load
        updateUI();
        renderChart();
    </script>
</body>
</html>
