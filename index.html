<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>森之記帳 🌿</title>
    
    <!-- 外部庫 -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --forest-deep: #3A5A40;   /* 深森林綠 */
            --forest-mid: #588157;    /* 鼠尾草綠 */
            --forest-light: #A3B18A;  /* 淡綠色 */
            --earth-beige: #DAD7CD;   /* 米色/大地色 */
            --bg-cream: #F9FBF9;      /* 極淺奶油綠 */
            --text-main: #344E41;     /* 深綠色文字 */
            --text-muted: #7A8D81;
            --card-shadow: 0 10px 25px rgba(58, 90, 64, 0.1);
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            background-color: var(--bg-cream);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* --- Header --- */
        header {
            background: white;
            padding: 30px 20px;
            text-align: center;
            border-radius: 0 0 40px 40px;
            box-shadow: var(--card-shadow);
            margin-bottom: 20px;
        }
        header h1 {
            margin: 0;
            font-size: 26px;
            color: var(--forest-deep);
            letter-spacing: 1px;
        }
        header p { font-size: 13px; color: var(--text-muted); margin: 5px 0 0; }

        /* --- Tab Navigation --- */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            z-index: 100;
            border-top: 1px solid var(--earth-beige);
        }
        .nav-item {
            text-align: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.3s;
            font-size: 12px;
            flex: 1;
        }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--forest-mid); font-weight: bold; }

        /* --- Page Content --- */
        .page { display: none; padding: 0 20px; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Card Style --- */
        .card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(163, 177, 138, 0.2);
        }
        .card-title {
            font-weight: bold;
            font-size: 17px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--forest-deep);
        }

        /* --- Form Elements --- */
        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; margin-bottom: 6px; color: var(--text-muted); margin-left: 5px; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #F0F2F0;
            border-radius: 15px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            color: var(--text-main);
        }
        input:focus { border-color: var(--forest-light); background-color: #FBFCFB; }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .cat-btn {
            padding: 10px 5px;
            border: 2px solid #F0F2F0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-main);
            transition: 0.2s;
        }
        .cat-btn.active {
            background: var(--forest-mid);
            color: white;
            border-color: var(--forest-mid);
            transform: scale(0.95);
        }

        /* --- OCR Upload --- */
        .upload-box {
            border: 2px dashed var(--forest-light);
            padding: 20px;
            text-align: center;
            border-radius: 20px;
            background: #F4F7F4;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 13px;
            color: var(--forest-mid);
            transition: 0.3s;
        }
        .upload-box:hover { background: #EDF2ED; border-color: var(--forest-mid); }

        /* --- Buttons --- */
        .btn-main {
            width: 100%;
            padding: 16px;
            background: var(--forest-mid);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(88, 129, 87, 0.3);
            transition: 0.3s;
        }
        .btn-main:active { transform: scale(0.98); opacity: 0.9; }

        /* --- Table --- */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; color: var(--text-muted); padding: 12px 10px; border-bottom: 2px solid #F0F2F0; }
        td { padding: 14px 10px; border-bottom: 1px solid #F9FBF9; }
        .type-income { color: #6B8E23; font-weight: bold; }
        .type-expense { color: #A0522D; font-weight: bold; }
        .btn-del { color: #B22222; border: 1px solid #B22222; background: none; border-radius: 6px; cursor: pointer; padding: 3px 7px; font-size: 11px; }

        /* --- Reminder Item --- */
        .reminder-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #FBFBFA;
            border-radius: 15px;
            margin-bottom: 10px;
            border-left: 4px solid var(--forest-light);
        }
        .reminder-info { font-size: 14px; }
        .reminder-date {
            background: var(--earth-beige);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            color: var(--forest-deep);
            font-weight: bold;
        }

        #loader {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 25px;
            box-shadow: var(--card-shadow);
            z-index: 1000;
            text-align: center;
            border: 1px solid var(--forest-light);
        }
    </style>
</head>
<body>

<div id="loader">🌿 森林正在思考...</div>

<div class="app-container">
    <header>
        <h1>森之記帳 🌿</h1>
        <p>用自然的方式，紀錄生活的每一分</p>
    </header>

    <!-- PAGE 1: 首頁 (分析與提醒) -->
    <div id="page-home" class="page active">
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-chart-pie"></i> 支出分佈</div>
            <canvas id="analysisChart"></canvas>
        </div>

        <div class="card">
            <div class="card-title"><i class="fa-solid fa-leaf"></i> 繳費提醒</div>
            <div id="reminders-list"></div>
            <button onclick="switchTab('add')" class="btn-main" style="margin-top:15px; font-size:13px; padding:10px; background: var(--forest-light);">+ 新增提醒</button>
        </div>
    </div>

    <!-- PAGE 2: 新增記帳 -->
    <div id="page-add" class="page">
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-pen-to-square"></i> 新增紀錄</div>
            
            <div class="upload-box" onclick="document.getElementById('file-input').click()">
                <i class="fa-solid fa-file-import"></i><br>
                上傳發票圖片或 PDF<br>
                <small>(智能解析金額)</small>
                <input type="file" id="file-input" hidden accept="image/*,application/pdf" onchange="processFile(this)">
            </div>

            <div class="input-group">
                <label>日期</label>
                <input type="date" id="date">
            </div>

            <div class="input-group">
                <label>類型</label>
                <select id="type" onchange="handleTypeChange()">
                    <option value="支出">支出</option>
                    <option value="收入">收入</option>
                    <option value="提醒">繳費提醒</option>
                </select>
            </div>

            <div class="input-group" id="category-section">
                <label>快速類別</label>
                <div class="category-grid" id="cat-grid"></div>
                <input type="text" id="category" placeholder="或自定義類別">
            </div>

            <div class="input-group">
                <label>金額</label>
                <input type="number" id="amount" placeholder="0">
            </div>

            <div class="input-group">
                <label>備註</label>
                <textarea id="memo" rows="2" placeholder="這筆錢的用途..."></textarea>
            </div>

            <button class="btn-main" id="submit-btn" onclick="addData()">儲存至森林 🍃</button>
        </div>
    </div>

    <!-- PAGE 3: 歷史紀錄 -->
    <div id="page-history" class="page">
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-clock-rotate-left"></i> 歷史紀錄</div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>類型</th>
                            <th>金額</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="data-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="nav-bar">
        <div class="nav-item active" onclick="switchTab('home')" id="nav-home">
            <i class="fa-solid fa-house-chimney"></i> 首頁
        </div>
        <div class="nav-item" onclick="switchTab('add')" id="nav-add">
            <i class="fa-solid fa-circle-plus"></i> 記帳
        </div>
        <div class="nav-item" onclick="switchTab('history')" id="nav-history">
            <i class="fa-solid fa-list-ul"></i> 紀錄
        </div>
    </nav>
</div>

<script>
    // ==========================================
    // 設定區：替換為你的 GAS URL
    // ==========================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbxRA96LfcUI3cLzUiZt5ggmNkdXeSRSgMAZvSKjxQrYnQBOcJQXtVkR303SMiUki7o6/exec'; 

    // 定義不同類型的類別清單
    const CATEGORIES_MAP = {
        '支出': ['美食', '交通', '購物', '娛樂', '居家', '醫療', '其他'],
        '收入': ['薪水', '獎金', '禮金', '其他'],
        '提醒': [] // 提醒模式下不顯示類別按鈕
    };

    let myChart = null;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    window.onload = () => {
        document.getElementById('date').valueAsDate = new Date();
        handleTypeChange(); // 初始化類別按鈕
        loadData();
    };

    // 處理類型切換：更新類別按鈕與顯示狀態
    function handleTypeChange() {
        const type = document.getElementById('type').value;
        const categorySection = document.getElementById('category-section');
        const catGrid = document.getElementById('cat-grid');
        
        // 1. 清空目前的類別選擇 (避免 支出類別 被儲存為 收入)
        document.getElementById('category').value = '';
        
        // 2. 根據類型決定是否顯示類別區塊
        if (type === '提醒') {
            categorySection.style.display = 'none';
        } else {
            categorySection.style.display = 'block';
            // 3. 重新渲染對應的類別按鈕
            renderCategoryButtons(type);
        }
    }

    function renderCategoryButtons(type) {
        const grid = document.getElementById('cat-grid');
        grid.innerHTML = ''; // 清空舊按鈕
        
        const categories = CATEGORIES_MAP[type] || [];
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.innerText = cat;
            btn.className = 'cat-btn';
            btn.onclick = () => {
                document.getElementById('category').value = cat;
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
            grid.appendChild(btn);
        });
    }

    function switchTab(tab) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`page-${tab}`).classList.add('active');
        document.getElementById(`nav-${tab}`).classList.add('active');
        if(tab === 'home') loadData();
    }

    // ==========================================
    // OCR 智能金額解析邏輯
    // ==========================================
    async function processFile(input) {
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];
        const loader = document.getElementById('loader');
        loader.style.display = 'block';
        loader.innerText = '🌿 正在讀取檔案...';

        try {
            let imageSource;
            if (file.type === 'application/pdf') {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 2 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                imageSource = canvas.toDataURL('image/png');
            } else {
                imageSource = file;
            }

            loader.innerText = '🔍 正在分析發票內容...';
            const result = await Tesseract.recognize(imageSource, 'eng+chi_tra');
            const text = result.data.text;
            
            const amount = extractAmount(text);
            if (amount) {
                document.getElementById('amount').value = amount;
                loader.innerText = `✅ 偵測到金額: $${amount}`;
            } else {
                loader.innerText = '❌ 未能解析金額，請手動填寫';
            }
        } catch (e) {
            console.error(e);
            loader.innerText = '⚠️ 辨識出錯';
        }
        setTimeout(() => loader.style.display = 'none', 2500);
    }

    function extractAmount(text) {
        const keywords = ['合計', '總計', '總額', '總計金額', 'TOTAL', 'AMOUNT', 'SUM', 'TOTAL AMOUNT'];
        const lines = text.split('\n');
        
        for (let line of lines) {
            for (let key of keywords) {
                if (line.toUpperCase().includes(key.toUpperCase())) {
                    const matches = line.match(/\d{1,3}(,\d{3})*(\.\d+)?/g);
                    if (matches) {
                        const lastMatch = matches[matches.length - 1];
                        return parseFloat(lastMatch.replace(/,/g, ''));
                    }
                }
            }
        }
        return null;
    }

    // ==========================================
    // Google Sheets 操作
    // ==========================================
    async function loadData() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            renderUI(data);
        } catch (e) {
            console.error('讀取失敗', e);
        }
    }

function renderUI(data) {
    // 1. 獲取 DOM 元素
    const tbody = document.getElementById('data-table');
    const remList = document.getElementById('reminders-list');
    
    // 2. 清空舊資料，準備重新渲染
    tbody.innerHTML = '';
    remList.innerHTML = '';
    
    // 用於儲存圖表數據的對象 (例如: { '美食': 500, '交通': 200 })
    const chartData = {};

    // 3. 遍歷所有從 Google Sheets 取得的資料
    data.forEach(item => {
        // --- 空值防護：如果欄位是空的，給予預設值，防止顯示 undefined ---
        const date = item.date || '無日期';
        const type = item.type || '未知';
        const category = item.category || '未分類';
        const amount = item.amount || 0;
        const memo = item.memo || '';
        const rowId = item.row; // 這是刪除時必須的行號

        // --- 分流邏輯：判斷是「提醒」還是「交易紀錄」 ---
        if (type === '提醒') {
            // A. 渲染【繳費提醒】區塊
            const reminderHtml = `
                <div class="reminder-item">
                    <div class="reminder-info">
                        <strong>${category}</strong>: ${memo}
                    </div>
                    <div>
                        <span class="reminder-date">${date}</span> 
                        <span style="margin-left:10px; font-weight:bold;">$${amount}</span>
                    </div>
                </div>`;
            remList.innerHTML += reminderHtml;

        } else {
            // B. 渲染【歷史紀錄】表格
            const row = document.createElement('tr');
            
            // 根據類型設定顏色類別
            const typeClass = (type === '收入') ? 'type-income' : 'type-expense';
            
            row.innerHTML = `
                <td>${date}</td>
                <td class="${typeClass}">${type}</td>
                <td style="font-weight:bold;">$${amount}</td>
                <td>
                    <button class="btn-del" onclick="deleteData(${rowId})">刪除</button>
                </td>
            `;
            tbody.appendChild(row);

            // C. 準備【支出分析圖表】數據 (僅計算類型為「支出」的資料)
            if (type === '支出') {
                // 如果該類別已存在則累加，不存在則初始化為 0
                chartData[category] = (chartData[category] || 0) + parseFloat(amount);
            }
        }
    });

    // 4. 檢查提醒清單是否為空
    if (remList.innerHTML === '') {
        remList.innerHTML = '<p style="text-align:center; color:#AAA; font-size:12px; padding:10px;">目前沒有提醒事項 🍃</p>';
    }

    // 5. 呼叫圖表渲染函數，將整理好的 chartData 傳進去
    renderChart(chartData);
}

    function renderChart(chartData) {
        const ctx = document.getElementById('analysisChart').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(chartData),
                datasets: [{
                    data: Object.values(chartData),
                    backgroundColor: ['#588157', '#A3B18A', '#DAD7CD', '#3A5A40', '#BCCDBA', '#8A9A5B', '#C2B280'],
                    borderWidth: 4,
                    borderColor: '#fff'
                }]
            },
            options: {
                plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } },
                cutout: '70%'
            }
        });
    }

    async function addData() {
        const data = {
            action: 'add',
            date: document.getElementById('date').value,
            type: document.getElementById('type').value,
            category: document.getElementById('category').value,
            amount: document.getElementById('amount').value,
            memo: document.getElementById('memo').value
        };

        if (!data.amount) return alert('請輸入金額唷！');

        document.getElementById('loader').style.display = 'block';
        try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            setTimeout(() => {
                loadData();
                switchTab('home');
                document.getElementById('loader').style.display = 'none';
                clearForm();
            }, 1500);
        } catch (e) {
            alert('儲存失敗');
            document.getElementById('loader').style.display = 'none';
        }
    }

    async function deleteData(rowId) {
        if (!confirm('確定要刪除這筆紀錄嗎？')) return;
        document.getElementById('loader').style.display = 'block';
        try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', row: rowId }) });
            setTimeout(() => {
                loadData();
                document.getElementById('loader').style.display = 'none';
            }, 1000);
        } catch (e) {
            alert('刪除失敗');
            document.getElementById('loader').style.display = 'none';
        }
    }

    function clearForm() {
        document.getElementById('amount').value = '';
        document.getElementById('memo').value = '';
        document.getElementById('category').value = '';
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    }
</script>

</body>
</html>
