<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>森之記帳 🌿</title>
    
    <!-- 外部庫 -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --forest-deep: #3A5A40;   /* 深森林綠 */
            --forest-mid: #588157;    /* 鼠尾草綠 */
            --forest-light: #A3B18A;  /* 淡綠色 */
            --earth-beige: #DAD7CD;   /* 米色/大地色 */
            --bg-cream: #F9FBF9;      /* 極淺奶油綠 */
            --text-main: #344E41;     /* 深綠色文字 */
            --text-muted: #7A8D81;
            --card-shadow: 0 10px 25px rgba(58, 90, 64, 0.1);
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            background-color: var(--bg-cream);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* --- Header --- */
        header {
            background: white;
            padding: 30px 20px;
            text-align: center;
            border-radius: 0 0 40px 40px;
            box-shadow: var(--card-shadow);
            margin-bottom: 20px;
        }
        header h1 {
            margin: 0;
            font-size: 26px;
            color: var(--forest-deep);
            letter-spacing: 1px;
        }
        header p { font-size: 13px; color: var(--text-muted); margin: 5px 0 0; }

        /* --- Tab Navigation --- */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            z-index: 100;
            border-top: 1px solid var(--earth-beige);
        }
        .nav-item {
            text-align: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.3s;
            font-size: 12px;
            flex: 1;
        }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--forest-mid); font-weight: bold; }

        /* --- Page Content --- */
        .page { display: none; padding: 0 20px; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Card Style --- */
        .card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(163, 177, 138, 0.2);
        }
        .card-title {
            font-weight: bold;
            font-size: 17px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--forest-deep);
        }

        /* --- Form Elements --- */
        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; margin-bottom: 6px; color: var(--text-muted); margin-left: 5px; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #F0F2F0;
            border-radius: 15px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            color: var(--text-main);
        }
        input:focus { border-color: var(--forest-light); background-color: #FBFCFB; }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .cat-btn {
            padding: 10px 5px;
            border: 2px solid #F0F2F0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-main);
            transition: 0.2s;
        }
        .cat-btn.active {
            background: var(--forest-mid);
            color: white;
            border-color: var(--forest-mid);
            transform: scale(0.95);
        }

        /* --- OCR Upload --- */
        .upload-box {
            border: 2px dashed var(--forest-light);
            padding: 20px;
            text-align: center;
            border-radius: 20px;
            background: #F4F7F4;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 13px;
            color: var(--forest-mid);
            transition: 0.3s;
        }
        .upload-box:hover { background: #EDF2ED; border-color: var(--forest-mid); }

        /* --- Buttons --- */
        .btn-main {
            width: 100%;
            padding: 16px;
            background: var(--forest-mid);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(88, 129, 87, 0.3);
            transition: 0.3s;
        }
        .btn-main:active { transform: scale(0.98); opacity: 0.9; }

        /* --- Table --- */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; color: var(--text-muted); padding: 12px 10px; border-bottom: 2px solid #F0F2F0; }
        td { padding: 14px 10px; border-bottom: 1px solid #F9FBF9; }
        .type-income { color: #6B8E23; font-weight: bold; }
        .type-expense { color: #A0522D; font-weight: bold; }
        .btn-del { color: #B22222; border: 1px solid #B22222; background: none; border-radius: 6px; cursor: pointer; padding: 3px 7px; font-size: 11px; }

        /* --- Reminder Item --- */
        .reminder-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #FBFBFA;
            border-radius: 15px;
            margin-bottom: 10px;
            border-left: 4px solid var(--forest-light);
        }
        .reminder-info { font-size: 14px; }
        .reminder-date {
            background: var(--earth-beige);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            color: var(--forest-deep);
            font-weight: bold;
        }

        #loader {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 25px;
            box-shadow: var(--card-shadow);
            z-index: 1000;
            text-align: center;
            border: 1px solid var(--forest-light);
        }
        .btn-cancel {
            width: 100%;
            padding: 12px;
            background: #ddd;
            color: #666;
            border: none;
            border-radius: 15px;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-edit {
            color: var(--forest-mid);
            border: 1px solid var(--forest-mid);
            background: none;
            border-radius: 6px;
            cursor: pointer;
            padding: 3px 7px;
            font-size: 11px;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div id="loader">🌿 森林正在思考...</div>

<div class="app-container">
    <header>
        <h1>森之記帳 🌿</h1>
        <p>用自然的方式，紀錄生活的每一分</p>
    </header>

    <!-- PAGE 1: 首頁 (分析與提醒) -->
    <div id="page-home" class="page active">
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-chart-pie"></i> 支出分佈</div>
            <canvas id="analysisChart"></canvas>
        </div>

        <div class="card">
            <div class="card-title"><i class="fa-solid fa-leaf"></i> 繳費提醒</div>
            <div id="reminders-list"></div>
            <button onclick="switchTab('add')" class="btn-main" style="margin-top:15px; font-size:13px; padding:10px; background: var(--forest-light);">+ 新增提醒</button>
        </div>
    </div>

    <!-- PAGE 2: 新增記帳 -->
    <div id="page-add" class="page">
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-pen-to-square"></i> 新增紀錄</div>
            
            <div class="upload-box" onclick="document.getElementById('file-input').click()">
                <i class="fa-solid fa-file-import"></i><br>
                上傳發票圖片或 PDF<br>
                <small>(智能解析金額)</small>
                <input type="file" id="file-input" hidden accept="image/*,application/pdf" onchange="processFile(this)">
            </div>

            <div class="input-group">
                <label>日期</label>
                <input type="date" id="date">
            </div>

            <div class="input-group">
                <label>類型</label>
                <select id="type" onchange="handleTypeChange()">
                    <option value="支出">支出</option>
                    <option value="收入">收入</option>
                    <option value="提醒">繳費提醒</option>
                </select>
            </div>

            <div class="input-group" id="category-section">
                <label>快速類別</label>
                <div class="category-grid" id="cat-grid"></div>
                <input type="text" id="category" placeholder="或自定義類別">
            </div>

            <div class="input-group">
                <label>金額</label>
                <input type="number" id="amount" placeholder="0">
            </div>

            <div class="input-group">
                <label>備註</label>
                <textarea id="memo" rows="2" placeholder="這筆錢的用途..."></textarea>
            </div>

            <button class="btn-main" id="submit-btn" onclick="addData()">儲存至森林 🍃</button>
        </div>
    </div>

    <!-- PAGE 3: 歷史紀錄 -->
    <div id="page-history" class="page">
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-clock-rotate-left"></i> 歷史紀錄</div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>類型</th>
                            <th>金額</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="data-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="nav-bar">
        <div class="nav-item active" onclick="switchTab('home')" id="nav-home">
            <i class="fa-solid fa-house-chimney"></i> 首頁
        </div>
        <div class="nav-item" onclick="switchTab('add')" id="nav-add">
            <i class="fa-solid fa-circle-plus"></i> 記帳
        </div>
        <div class="nav-item" onclick="switchTab('history')" id="nav-history">
            <i class="fa-solid fa-list-ul"></i> 紀錄
        </div>
    </nav>
</div>

<button class="btn-main" id="submit-btn" onclick="saveData()">儲存至森林 🍃</button>
<button class="btn-cancel" id="cancel-btn" style="display:none;" onclick="cancelEdit()">取消修改</button>

<script>
    const API_URL = '你的網址'; 
    const CATEGORIES_MAP = {
        '支出': ['美食', '交通', '購物', '娛樂', '居家', '醫療', '其他'],
        '收入': ['薪水', '獎金', '禮金', '其他'],
        '提醒': []
    };

    let myChart = null;
    let localData = []; // 【優化】本地快取資料，實現秒速更新
    let editRowId = null; // 【功能】追蹤目前是否在編輯模式，null 為新增，數字為行號

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    window.onload = () => {
        document.getElementById('date').valueAsDate = new Date();
        handleTypeChange();
        loadData();
    };

    // ... (handleTypeChange, renderCategoryButtons, switchTab, processFile, extractAmount 保持不變) ...
    function handleTypeChange() {
        const type = document.getElementById('type').value;
        const categorySection = document.getElementById('category-section');
        document.getElementById('category').value = '';
        if (type === '提醒') {
            categorySection.style.display = 'none';
        } else {
            categorySection.style.display = 'block';
            renderCategoryButtons(type);
        }
    }
    function renderCategoryButtons(type) {
        const grid = document.getElementById('cat-grid');
        grid.innerHTML = ''; 
        const categories = CATEGORIES_MAP[type] || [];
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.innerText = cat;
            btn.className = 'cat-btn';
            btn.onclick = () => {
                document.getElementById('category').value = cat;
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
            grid.appendChild(btn);
        });
    }
    function switchTab(tab) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`page-${tab}`).classList.add('active');
        document.getElementById(`nav-${tab}`).classList.add('active');
    }

    // ==========================================
    // 核心功能：修改資料
    // ==========================================
    function editData(rowId) {
        // 1. 從本地快取找回資料
        const item = localData.find(i => i.row === rowId);
        if (!item) return;

        // 2. 填入表單
        document.getElementById('date').value = item.date;
        document.getElementById('type').value = item.type;
        handleTypeChange(); // 更新類別按鈕
        document.getElementById('category').value = item.category || '';
        document.getElementById('amount').value = item.amount;
        document.getElementById('memo').value = item.memo;

        // 3. 切換 UI 狀態
        editRowId = rowId;
        document.getElementById('submit-btn').innerText = '更新紀錄 ✨';
        document.getElementById('cancel-btn').style.display = 'block';
        
        switchTab('add');
    }

    function cancelEdit() {
        editRowId = null;
        document.getElementById('submit-btn').innerText = '儲存至森林 🍃';
        document.getElementById('cancel-btn').style.display = 'none';
        clearForm();
    }

    // ==========================================
    // 優化後的儲存邏輯 (樂觀更新)
    // ==========================================
    async function saveData() {
        const amount = document.getElementById('amount').value;
        if (!amount) return alert('請輸入金額唷！');

        const record = {
            date: document.getElementById('date').value,
            type: document.getElementById('type').value,
            category: document.getElementById('category').value,
            amount: amount,
            memo: document.getElementById('memo').value
        };

        const action = editRowId ? 'update' : 'add';
        const payload = { 
            action: action, 
            ...record, 
            row: editRowId,
            id: editRowId ? localData.find(i => i.row === editRowId).id : new Date().getTime()
        };

        // --- 樂觀更新 (Optimistic UI) ---
        if (action === 'add') {
            // 立即將資料加入本地清單
            localData.unshift({ ...payload, row: localData.length + 2 }); 
        } else {
            // 立即更新本地清單中的對應項目
            const idx = localData.findIndex(i => i.row === editRowId);
            localData[idx] = { ...localData[idx], ...record };
        }

        // 立即刷新畫面 (使用者感覺是秒存)
        renderUI(localData); 
        
        // 背景同步到 Google Sheets (不等待 response)
        fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });

        // 重置 UI
        cancelEdit();
        switchTab('home');
    }

    // ==========================================
    // 資料讀取與渲染
    // ==========================================
    async function loadData() {
        try {
            const response = await fetch(API_URL);
            localData = await response.json(); // 儲存到本地快取
            renderUI(localData);
        } catch (e) {
            console.error('讀取失敗', e);
        }
    }

    function renderUI(data) {
        const tbody = document.getElementById('data-table');
        const remList = document.getElementById('reminders-list');
        tbody.innerHTML = '';
        remList.innerHTML = '';
        const chartData = {};

        const formatDate = (dateInput) => {
            if (!dateInput) return '無日期';
            try {
                const d = new Date(dateInput);
                if (isNaN(d.getTime())) return dateInput;
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            } catch (e) { return dateInput; }
        };

        data.forEach(item => {
            const date = formatDate(item.date);
            const type = item.type || '未知';
            const category = item.category || '未分類';
            const amount = item.amount || 0;
            const memo = item.memo || '';
            const rowId = item.row;

            if (type === '提醒') {
                remList.innerHTML += `
                    <div class="reminder-item">
                        <div class="reminder-info"><strong>${category}</strong>: ${memo}</div>
                        <div><span class="reminder-date">${date}</span> <span style="margin-left:10px">$${amount}</span></div>
                    </div>`;
            } else {
                const row = document.createElement('tr');
                const typeClass = (type === '收入') ? 'type-income' : 'type-expense';
                row.innerHTML = `
                    <td>${date}</td>
                    <td class="${typeClass}">${type}</td>
                    <td style="font-weight:bold;">$${amount}</td>
                    <td>
                        <button class="btn-edit" onclick="editData(${rowId})">修改</button>
                        <button class="btn-del" onclick="deleteData(${rowId})">刪除</button>
                    </td>
                `;
                tbody.appendChild(row);
                if (type === '支出') chartData[category] = (chartData[category] || 0) + parseFloat(amount);
            }
        });
        if (remList.innerHTML === '') remList.innerHTML = '<p style="text-align:center; color:#AAA; font-size:12px; padding:10px;">目前沒有提醒事項 🍃</p>';
        renderChart(chartData);
    }

    async function deleteData(rowId) {
        if (!confirm('確定要刪除嗎？')) return;
        
        // 樂觀更新：立即從本地刪除
        localData = localData.filter(i => i.row !== rowId);
        renderUI(localData);

        // 背景同步
        fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', row: rowId }) });
    }

    function renderChart(chartData) {
        const ctx = document.getElementById('analysisChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(chartData),
                datasets: [{
                    data: Object.values(chartData),
                    backgroundColor: ['#588157', '#A3B18A', '#DAD7CD', '#3A5A40', '#BCCDBA', '#8A9A5B', '#C2B280'],
                    borderWidth: 4, borderColor: '#fff'
                }]
            },
            options: { plugins: { legend: { position: 'bottom' } }, cutout: '70%' }
        });
    }

    function clearForm() {
        document.getElementById('amount').value = '';
        document.getElementById('memo').value = '';
        document.getElementById('category').value = '';
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    }
</script>

</body>
</html>
