<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>森之記帳 🌿</title>
    
    <link rel="apple-touch-icon" href="https://github.com/llcrazy001-eng/money-tracker/blob/main/gold_image.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome,6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --forest-deep: #3A5A40;
            --forest-mid: #588157;
            --forest-light: #A3B18A;
            --earth-beige: #DAD7CD;
            --bg-cream: #F9FBF9;
            --text-main: #344E41;
            --text-muted: #7A8D81;
            --accent-bright: #FFD93D; 
            --accent-blue: #6BCB77;   
            --income-gold: #D4AF37;
            --card-shadow: 0 10px 25px rgba(58, 90, 64, 0.1);
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            background-color: var(--bg-cream);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            min-height: 100vh;
            padding-bottom: 110px;
            box-sizing: border-box;
        }

        header {
            background: white; padding: 30px 20px; text-align: center;
            border-radius: 0 0 40px 40px; box-shadow: var(--card-shadow); margin-bottom: 20px;
        }
        header h1 { margin: 0; font-size: 26px; color: var(--forest-deep); }
        header p { font-size: 13px; color: var(--text-muted); margin: 5px 0 0; }

        .summary-card {
            background: linear-gradient(135deg, var(--forest-deep), var(--forest-mid));
            color: white; border-radius: 24px; padding: 25px; margin: 0 20px 20px;
            box-shadow: var(--card-shadow); display: flex; justify-content: space-around; align-items: center;
        }
        .summary-item p { margin: 0; font-size: 12px; opacity: 0.8; }
        .summary-item h2 { margin: 5px 0 0; font-size: 20px; font-weight: bold; }

        /* --- Nav Bar 優化: 區塊填色與字體放大 --- */
        .nav-bar {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 600px; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px); display: flex; justify-content: space-around;
            padding: 12px 10px;
            border-radius: 30px 30px 0 0; box-shadow: 0 -8px 25px rgba(0,0,0,0.08);
            z-index: 100; border-top: 1px solid var(--earth-beige); box-sizing: border-box;
        }
        .nav-item {
            text-align: center; color: var(--text-muted); cursor: pointer;
            transition: all 0.3s ease; font-size: 15px; flex: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 4px; border-radius: 20px; margin: 0 5px;
            padding: 10px 0;
        }
        .nav-item i { font-size: 22px; }
        
        /* 各分頁獨立的淺色底色填充 */
        #nav-home.active { 
            background-color: #E8F5E9; /* 淺森林綠 */
            color: var(--forest-deep); 
            font-weight: bold;
        }
        #nav-add.active { 
            background-color: #E0F2F1; /* 淺青色 */
            color: var(--accent-blue); 
            font-weight: bold;
        }
        #nav-history.active { 
            background-color: #F5F5F5; /* 淺米灰 */
            color: #8B4513; 
            font-weight: bold;
        }

        .page { display: none; padding: 0 20px; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px;
            box-shadow: var(--card-shadow); border: 1px solid rgba(163, 177, 138, 0.2);
        }
        .card-title { font-weight: bold; font-size: 17px; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; color: var(--forest-deep); }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; margin-bottom: 6px; color: var(--text-muted); margin-left: 5px; }
        input, select, textarea {
            width: 100%; padding: 12px; border: 2px solid #F0F2F0; border-radius: 15px;
            box-sizing: border-box; font-size: 15px; outline: none; transition: 0.3s; color: var(--text-main);
        }
        input:focus { border-color: var(--forest-light); }

        /* 類別按鈕：字體加大至 14px */
        .category-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); 
            gap: 10px; 
            margin-bottom: 15px; 
        }
        .cat-btn {
            padding: 12px 5px; border: 2px solid #F0F2F0; background: white; border-radius: 12px;
            cursor: pointer; font-size: 14px; transition: 0.2s; text-align: center;
        }
        .cat-btn.active.expense { background: var(--forest-mid); color: white; border-color: var(--forest-mid); }
        .cat-btn.active.income { background: var(--income-gold); color: white; border-color: var(--income-gold); }
        .cat-btn.active.reminder { background: var(--accent-bright); color: var(--forest-deep); border-color: var(--accent-bright); }

        .upload-box {
            border: 2px dashed var(--forest-light); padding: 20px; text-align: center; border-radius: 20px;
            background: #F4F7F4; cursor: pointer; margin-bottom: 20px; font-size: 13px; color: var(--forest-mid);
        }

        .btn-main {
            width: 100%; padding: 16px; background: var(--forest-mid); color: white; border: none;
            border-radius: 18px; font-size: 16px; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px 15px rgba(88, 129, 87, 0.3); transition: 0.3s;
        }
        .btn-cancel { width: 100%; padding: 12px; background: #eee; color: #888; border: none; border-radius: 15px; margin-top: 10px; cursor: pointer; font-weight: bold; }

        .reminder-item {
            display: flex; justify-content: space-between; align-items: center; padding: 15px;
            background: #FFFDF0; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid var(--accent-bright);
        }
        .reminder-content { display: flex; align-items: center; gap: 12px; flex: 1; }
        .reminder-checkbox { width: 20px; height: 20px; accent-color: var(--forest-mid); cursor: pointer; }
        .reminder-info { font-size: 14px; display: flex; flex-direction: column; }
        .reminder-cat { font-size: 10px; color: var(--forest-mid); font-weight: bold; }
        .reminder-date { background: var(--earth-beige); padding: 3px 8px; border-radius: 6px; font-size: 11px; color: var(--forest-deep); font-weight: bold; }

        .month-section { margin-bottom: 15px; border: 1px solid var(--earth-beige); border-radius: 20px; overflow: hidden; background: white; }
        .month-header {
            background: var(--earth-beige); padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; color: var(--forest-deep);
        }
        .month-content { display: none; padding: 10px; }
        .month-content.active { display: block; }

        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 350px; }
        th { text-align: left; color: var(--text-muted); padding: 12px 10px; border-bottom: 2px solid #F0F2F0; }
        td { padding: 12px 10px; border-bottom: 1px solid #F9FBF9; }
        .type-income { color: #6B8E23; font-weight: bold; }
        .type-expense { color: #A0522D; font-weight: bold; }
        .btn-del { color: #B22222; border: 1px solid #B22222; background: none; border-radius: 6px; cursor: pointer; padding: 3px 7px; font-size: 11px; }
        .btn-edit { color: var(--forest-mid); border: 1px solid var(--forest-mid); background: none; border-radius: 6px; cursor: pointer; padding: 3px 7px; font-size: 11px; margin-right: 5px; }

        #loader {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95); padding: 25px; border-radius: 25px;
            box-shadow: var(--card-shadow); z-index: 1000; text-align: center; border: 1px solid var(--forest-light);
        }
    </style>
</head>
<body>

<div id="loader">🌿 森林正在思考...</div>

<div class="app-container">
    <header>
        <h1>森之記帳 🌿</h1>
        <p>用自然的方式，紀錄生活的每一分</p>
    </header>

    <div id="page-home" class="page active">
        <div class="summary-card">
            <div class="summary-item">
                <p>本月收入</p>
                <h2 id="month-income">$ 0</h2>
            </div>
            <div class="summary-item" style="text-align: right;">
                <p>本月支出</p>
                <h2 id="month-expense">$ 0</h2>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><i class="fa-solid fa-leaf"></i> 繳費提醒</div>
            <div id="reminders-list"></div>
            <button onclick="addReminder()" class="btn-main" style="margin-top:15px; font-size:13px; padding:10px; background: var(--accent-bright); color: var(--forest-deep);">+ 新增提醒</button>
        </div>

        <button onclick="quickExpense()" class="btn-main" style="margin-bottom: 20px; background: var(--accent-blue); box-shadow: 0 6px 15px rgba(107, 203, 119, 0.4);">
            <i class="fa-solid fa-bolt"></i> 快速支出紀錄
        </button>

        <div class="card">
            <div class="card-title"><i class="fa-solid fa-chart-pie"></i> 支出分佈</div>
            <canvas id="analysisChart"></canvas>
        </div>
    </div>

    <div id="page-add" class="page">
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-pen-to-square"></i> 新增紀錄</div>
            <div class="upload-box" onclick="document.getElementById('file-input').click()">
                <i class="fa-solid fa-file-import"></i><br>上傳發票圖片或 PDF<br><small>(智能解析金額)</small>
                <input type="file" id="file-input" hidden accept="image/*,application/pdf" onchange="processFile(this)">
            </div>
            <div class="input-group">
                <label>日期</label>
                <input type="date" id="date">
            </div>
            <div class="input-group">
                <label>類型</label>
                <select id="type" onchange="handleTypeChange()">
                    <option value="支出">支出</option>
                    <option value="收入">收入</option>
                    <option value="提醒">繳費提醒</option>
                </select>
            </div>
            <div class="input-group" id="category-section">
                <label>快速類別</label>
                <div class="category-grid" id="cat-grid"></div>
                <input type="text" id="category" placeholder="或自定義類別">
            </div>
            <div class="input-group">
                <label>金額</label>
                <input type="number" id="amount" placeholder="0">
            </div>
            <div class="input-group">
                <label>備註</label>
                <textarea id="memo" rows="2" placeholder="這筆錢的用途..."></textarea>
            </div>
            <button class="btn-main" id="submit-btn" onclick="saveData()">儲存至森林 🍃</button>
            <button class="btn-cancel" id="cancel-btn" style="display:none;" onclick="cancelEdit()">取消修改</button>
        </div>
    </div>

    <div id="page-history" class="page">
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-clock-rotate-left"></i> 歷史紀錄</div>
            <div id="history-accordion"></div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="switchTab('home')" id="nav-home">
            <i class="fa-solid fa-house-chimney"></i> <span>首頁</span>
        </div>
        <div class="nav-item" onclick="switchTab('add')" id="nav-add">
            <i class="fa-solid fa-circle-plus"></i> <span>記帳</span>
        </div>
        <div class="nav-item" onclick="switchTab('history')" id="nav-history">
            <i class="fa-solid fa-list-ul"></i> <span>紀錄</span>
        </div>
    </nav>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxRA96LfcUI3cLzUiZt5ggmNkdXeSRSgMAZvSKjxQrYnQBOcJQXtVkR303SMiUki7o6/exec'; 
    const CATEGORIES_MAP = {
        '支出': ['美食', '交通', '購物', '娛樂', '生活', '醫療', '稅務', '其他'],
        '收入': ['薪水', '獎金', '禮金', '其他'],
        '提醒': ['美食', '交通', '購物', '娛樂', '生活', '醫療', '稅務', '其他']
    };

    let myChart = null;
    let localData = []; 
    let editRowId = null; 

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    window.onload = () => {
        document.getElementById('date').valueAsDate = new Date();
        handleTypeChange();
        loadData();
    };

    function addReminder() {
        switchTab('add');
        document.getElementById('type').value = '提醒';
        handleTypeChange(); 
    }

    function quickExpense() {
        switchTab('add');
        document.getElementById('type').value = '支出';
        handleTypeChange();
    }

    function handleTypeChange(isManual = true) {
        const type = document.getElementById('type').value;
        const categorySection = document.getElementById('category-section');
        if (isManual) {
            document.getElementById('category').value = '';
        }
        categorySection.style.display = 'block';
        renderCategoryButtons(type);
    }

    function renderCategoryButtons(type) {
        const grid = document.getElementById('cat-grid');
        grid.innerHTML = ''; 
        const categories = CATEGORIES_MAP[type] || [];
        const currentVal = document.getElementById('category').value;

        let activeClass = 'active';
        if (type === '支出') activeClass = 'active expense';
        else if (type === '收入') activeClass = 'active income';
        else if (type === '提醒') activeClass = 'active reminder';

        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.innerText = cat;
            btn.className = 'cat-btn' + (currentVal === cat ? ' ' + activeClass : '');
            btn.onclick = () => {
                document.getElementById('category').value = cat;
                document.querySelectorAll('.cat-btn').forEach(b => {
                    b.classList.remove('active', 'expense', 'income', 'reminder');
                });
                btn.classList.add(...activeClass.split(' '));
            };
            grid.appendChild(btn);
        });
    }

    function switchTab(tab) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`page-${tab}`).classList.add('active');
        document.getElementById(`nav-${tab}`).classList.add('active');
    }

    async function processFile(input) {
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];
        const loader = document.getElementById('loader');
        loader.style.display = 'block';
        loader.innerText = '🌿 正在讀取檔案...';
        try {
            let imageSource;
            if (file.type === 'application/pdf') {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 2 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                imageSource = canvas.toDataURL('image/png');
            } else {
                imageSource = file;
            }
            loader.innerText = '🔍 正在分析發票內容...';
            const result = await Tesseract.recognize(imageSource, 'eng+chi_tra');
            const text = result.data.text;
            const amount = extractAmount(text);
            if (amount) {
                document.getElementById('amount').value = amount;
                loader.innerText = `✅ 偵測到金額: $${amount}`;
            } else {
                loader.innerText = '❌ 未能解析金額，請手動填寫';
            }
        } catch (e) { console.error(e); loader.innerText = '⚠️ 辨識出錯'; }
        setTimeout(() => loader.style.display = 'none', 2500);
    }

    function extractAmount(text) {
        const keywords = ['合計', '總計', '總額', '總計金額', 'TOTAL', 'AMOUNT', 'SUM', 'TOTAL AMOUNT'];
        const lines = text.split('\n');
        for (let line of lines) {
            for (let key of keywords) {
                if (line.toUpperCase().includes(key.toUpperCase())) {
                    const matches = line.match(/\d{1,3}(,\d{3})*(\.\d+)?/g);
                    if (matches) return parseFloat(matches[matches.length - 1].replace(/,/g, ''));
                }
            }
        }
        return null;
    }

    function editData(rowId) {
        const item = localData.find(i => i.row === rowId);
        if (!item) return;
        document.getElementById('date').value = item.date;
        document.getElementById('type').value = item.type;
        handleTypeChange(false); 
        document.getElementById('category').value = item.category || '';
        document.getElementById('amount').value = item.amount;
        document.getElementById('memo').value = item.memo;
        renderCategoryButtons(item.type);
        editRowId = rowId;
        document.getElementById('submit-btn').innerText = '更新紀錄 ✨';
        document.getElementById('cancel-btn').style.display = 'block';
        switchTab('add');
    }

    function cancelEdit() {
        editRowId = null;
        document.getElementById('submit-btn').innerText = '儲存至森林 🍃';
        document.getElementById('cancel-btn').style.display = 'none';
        clearForm();
    }

    async function saveData() {
        const amount = document.getElementById('amount').value;
        if (!amount) return alert('請輸入金額唷！');
        const record = {
            date: document.getElementById('date').value,
            type: document.getElementById('type').value,
            category: document.getElementById('category').value,
            amount: amount,
            memo: document.getElementById('memo').value
        };
        const action = editRowId ? 'update' : 'add';
        const payload = { 
            action: action, ...record, row: editRowId,
            id: editRowId ? localData.find(i => i.row === editRowId).id : new Date().getTime()
        };
        if (action === 'add') {
            localData.unshift({ ...payload, row: localData.length + 2 }); 
        } else {
            const idx = localData.findIndex(i => i.row === editRowId);
            localData[idx] = { ...localData[idx], ...record };
        }
        renderUI(localData); 
        fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        cancelEdit();
        switchTab('home');
    }

    async function loadData() {
        try {
            const response = await fetch(API_URL);
            localData = await response.json();
            renderUI(localData);
        } catch (e) { console.error('讀取失敗', e); }
    }

    async function completeReminder(rowId) {
        const item = localData.find(i => i.row === rowId);
        if (!item) return;
        const expenseRecord = {
            action: 'add', 
            date: new Date().toISOString().split('T')[0], 
            type: '支出',
            category: item.category || '其他', 
            amount: item.amount, 
            memo: `【提醒完成】${item.memo}`
        };
        localData.unshift({ ...expenseRecord, row: localData.length + 2, id: new Date().getTime() });
        localData = localData.filter(i => i.row !== rowId);
        renderUI(localData);
        fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(expenseRecord) });
        fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', row: rowId }) });
    }

    function renderUI(data) {
        const remList = document.getElementById('reminders-list');
        const historyContainer = document.getElementById('history-accordion');
        remList.innerHTML = '';
        historyContainer.innerHTML = '';
        const chartData = {};

        const now = new Date();
        const currentMonth = now.toISOString().slice(0, 7); 
        let mIncome = 0, mExpense = 0;

        const formatDate = (dateInput) => {
            if (!dateInput) return '無日期';
            try {
                const d = new Date(dateInput);
                if (isNaN(d.getTime())) return dateInput;
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            } catch (e) { return dateInput; }
        };

        const grouped = {};

        data.forEach(item => {
            const date = formatDate(item.date);
            const type = item.type || '未知';
            const category = item.category || '未分類';
            const amount = parseFloat(item.amount) || 0;
            const memo = item.memo || '';
            const rowId = item.row;

            if (date.startsWith(currentMonth)) {
                if (type === '收入') mIncome += amount;
                if (type === '支出') mExpense += amount;
            }

            if (type === '提醒') {
                remList.innerHTML += `
                    <div class="reminder-item">
                        <div class="reminder-content">
                            <input type="checkbox" class="reminder-checkbox" onchange="if(this.checked) completeReminder(${rowId})">
                            <div class="reminder-info">
                                <span class="reminder-cat">${category}</span>
                                <span>${memo}</span>
                            </div>
                        </div>
                        <div><span class="reminder-date">${date}</span> <span style="margin-left:10px">$${amount}</span></div>
                    </div>`;
            } else {
                const month = date.substring(0, 7);
                if (!grouped[month]) grouped[month] = [];
                grouped[month].push(item);
                if (type === '支出') chartData[category] = (chartData[category] || 0) + amount;
            }
        });

        document.getElementById('month-income').innerText = `$ ${mIncome.toLocaleString()}`;
        document.getElementById('month-expense').innerText = `$ ${mExpense.toLocaleString()}`;

        if (remList.innerHTML === '') remList.innerHTML = '<p style="text-align:center; color:#AAA; font-size:12px; padding:10px;">目前沒有提醒事項 🍃</p>';

        const sortedMonths = Object.keys(grouped).sort().reverse();
        sortedMonths.forEach(month => {
            const section = document.createElement('div');
            section.className = 'month-section';
            const header = document.createElement('div');
            header.className = 'month-header';
            header.innerHTML = `<span>${month}</span> <i class="fa-solid fa-chevron-down"></i>`;
            const content = document.createElement('div');
            content.className = 'month-content' + (month === currentMonth ? ' active' : '');
            const table = document.createElement('table');
            table.innerHTML = `<thead><tr><th>日期</th><th>類型</th><th>金額</th><th>操作</th></tr></thead>`;
            const tbody = document.createElement('tbody');
            grouped[month].forEach(item => {
                const row = document.createElement('tr');
                const typeClass = (item.type === '收入') ? 'type-income' : 'type-expense';
                row.innerHTML = `
                    <td>${formatDate(item.date)}</td>
                    <td class="${typeClass}">${item.type}</td>
                    <td style="font-weight:bold;">$${item.amount}</td>
                    <td>
                        <button class="btn-edit" onclick="editData(${item.row})">修改</button>
                        <button class="btn-del" onclick="deleteData(${item.row})">刪除</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
            table.appendChild(tbody);
            content.appendChild(table);
            header.onclick = () => content.classList.toggle('active');
            section.appendChild(header);
            section.appendChild(content);
            historyContainer.appendChild(section);
        });
        renderChart(chartData);
    }

    async function deleteData(rowId) {
        if (!confirm('確定要刪除嗎？')) return;
        localData = localData.filter(i => i.row !== rowId);
        renderUI(localData);
        fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', row: rowId }) });
    }

    function renderChart(chartData) {
        const ctx = document.getElementById('analysisChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(chartData),
                datasets: [{
                    data: Object.values(chartData),
                    backgroundColor: ['#588157', '#A3B18A', '#DAD7CD', '#3A5A40', '#BCCDBA', '#8A9A5B', '#C2B280', '#8B4513'],
                    borderWidth: 4, borderColor: '#fff'
                }]
            },
            options: {
                plugins: { legend: { position: 'bottom' } },
                cutout: '70%'
            }
        });
    }

    function clearForm() {
        document.getElementById('amount').value = '';
        document.getElementById('memo').value = '';
        document.getElementById('category').value = '';
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active', 'expense', 'income', 'reminder'));
    }
</script>

</body>
</html>
